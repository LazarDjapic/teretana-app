# Promjena porta za Quarkus 
quarkus.http.port=8081

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=1234
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/teretana_db

quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Povezivanje sa Keycloak-om 
quarkus.oidc.auth-server-url=http://localhost:8080/realms/teretana-sluzba
quarkus.oidc.client-id=teretana-app

# Govorimo Quarkusu gdje u tokenu da trazi uloge (role)
quarkus.oidc.roles.role-claim-path=realm_access/roles